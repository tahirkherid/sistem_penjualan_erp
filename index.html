<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penjualan Modern</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white shadow-sm border-b border-slate-200 py-4 px-8 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600 flex items-center gap-2">
                ☕ Coffee Shop System
            </h1>
            <span class="bg-indigo-50 text-indigo-700 text-xs font-semibold px-3 py-1 rounded-full border border-indigo-200">
                Mode Kasir Online
            </span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Daftar Menu & Stok</h2>
                    <button onclick="muatProduk(); muatTransaksi();" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition">
                        🔄 Refresh Data
                    </button>
                </div>
                
                <div id="produk-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <p class="text-slate-400 italic">Menghubungkan ke database Supabase...</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-bold text-slate-800 mb-6">Live Transaksi Terakhir</h2>
                <div class="space-y-4 max-h-[500px] overflow-y-auto pr-1" id="transaksi-list">
                    <p class="text-slate-400 italic">Memuat riwayat...</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        // === KREDENSIAL SUPABASE KAMU (SUDAH DISESUAIKAN) ===
        const SUPABASE_URL = "https://rwatbshrfjzpexemtuab.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3YXRic2hyZmp6cGV4ZW10dWFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Mjc1ODYsImV4cCI6MjA5NzAwMzU4Nn0.52Gq99GYmkxSsMgjVeSkBuNW7GBqwTXpwqewKc7vVGM";
        
        const supabaseUrlClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 1. FUNGSI AMBIL DATA PRODUK
        async function muatProduk() {
            const { data, error } = await supabaseUrlClient.from('produk').select('*').order('nama', { ascending: true });
            if (error) {
                document.getElementById('produk-list').innerHTML = `<p class="text-red-500">Gagal koneksi database: ${error.message}</p>`;
                return;
            }

            const container = document.getElementById('produk-list');
            if (data.length === 0) {
                container.innerHTML = `<p class="text-slate-400 col-span-2">Belum ada data produk di Supabase. Silakan isi data di database kamu.</p>`;
                return;
            }

            container.innerHTML = '';
            data.forEach(item => {
                const isHabis = item.stok <= 0;
                
                container.innerHTML += `
                    <div class="border border-slate-100 bg-slate-50/50 p-4 rounded-xl flex flex-col justify-between hover:border-indigo-200 transition-all duration-200">
                        <div>
                            <div class="flex justify-between items-start gap-2 mb-1">
                                <h3 class="font-bold text-slate-800 text-lg">${item.nama}</h3>
                                <span class="text-xs font-semibold px-2 py-0.5 rounded ${isHabis ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}">
                                    Stok: ${item.stok}
                                </span>
                            </div>
                            <div class="space-y-0.5 mb-4">
                                <p class="text-xs text-amber-600 font-medium">📦 No. Batch: ${item.no_batch || '-'}</p>
                                <p class="text-xs text-slate-400">📅 Exp: ${item.exp ? new Date(item.exp).toLocaleDateString('id-ID') : '-'}</p>
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-center mt-2 pt-2 border-t border-slate-100">
                            <span class="font-extrabold text-indigo-600 text-base">Rp ${Number(item.harga).toLocaleString('id-ID')}</span>
                            <button 
                                onclick="beliProduk(${item.id}, ${item.harga}, ${item.stok}, '${item.no_batch || ''}', '${item.exp || ''}')" 
                                ${isHabis ? 'disabled' : ''}
                                class="px-4 py-2 rounded-lg text-sm font-semibold transition ${isHabis ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm shadow-indigo-100'}">
                                ${isHabis ? 'Habis' : 'Simpan Transaksi'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // 2. FUNGSI PROSES BELI
        async function beliProduk(id, harga, stokSaatIni, noBatch, exp) {
            if (stokSaatIni < 1) return;

            const { error: errorJual } = await supabaseUrlClient.from('penjualan').insert([
                { 
                    produk_id: id, 
                    jumlah: 1, 
                    total_harga: harga,
                    no_batch: noBatch ? noBatch : null, 
                    exp: exp ? exp : null 
                }
            ]);

            if (errorJual) {
                alert("Gagal mencatat transaksi: " + errorJual.message);
                return;
            }

            await supabaseUrlClient.from('produk').update({ stok: stokSaatIni - 1 }).eq('id', id);

            muatProduk();
            muatTransaksi();
        }

        // 3. FUNGSI AMBIL RIWAYAT TRANSAKSI
        async function muatTransaksi() {
            const { data, error } = await supabaseUrlClient
                .from('penjualan')
                .select('jumlah, total_harga, no_batch, produk(nama)')
                .order('id', { ascending: false })
                .limit(6);

            if (error) return console.error(error);

            const container = document.getElementById('transaksi-list');
            if (data.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-sm italic">Belum ada transaksi hari ini.</p>`;
                return;
            }

            container.innerHTML = '';
            data.forEach(t => {
                container.innerHTML += `
                    <div class="p-3 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center text-sm">
                        <div>
                            <p class="font-semibold text-slate-700">${t.produk ? t.produk.nama : 'Produk Dihapus'}</p>
                            <p class="text-xs text-slate-400">${t.jumlah} pcs • Batch: ${t.no_batch || '-'}</p>
                        </div>
                        <span class="font-bold text-emerald-600">Rp ${Number(t.total_harga).toLocaleString('id-ID')}</span>
                    </div>
                `;
            });
        }

        // Jalankan otomatis saat web dibuka
        muatProduk();
        muatTransaksi();
    </script>
</body>
</html>
